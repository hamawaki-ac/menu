<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>陸上部 練習メニュー管理</title>

<style>
:root{
  --emerald:#10b981;
  --emerald-2:#059669;
  --emerald-3:#047857;
  --emerald-soft:#ecfdf5;
  --bg:#f5f8f7;
  --panel:rgba(255,255,255,.92);
  --text:#16211d;
  --muted:#6b7280;
  --line:#dfe8e4;
  --danger:#dc2626;
  --shadow:0 18px 50px rgba(15,83,64,.10);
  --shadow-sm:0 8px 24px rgba(15,83,64,.08);
  --radius:20px;
  --overall:#3b82f6;
  --strength:#22c55e;
  --sprint:#ef4444;
  --hurdle:#f97316;
  --jump:#8b5cf6;
  --throw:#b7791f;
  --distance:#06b6d4;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;
  background:
    radial-gradient(circle at top left,rgba(16,185,129,.09),transparent 30%),
    radial-gradient(circle at top right,rgba(59,130,246,.07),transparent 28%),
    var(--bg);
  color:var(--text);
}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
header{
  position:sticky;
  top:0;
  z-index:30;
  backdrop-filter:blur(18px);
  background:linear-gradient(135deg,rgba(5,150,105,.96),rgba(4,120,87,.96));
  color:#fff;
  box-shadow:0 8px 30px rgba(4,120,87,.22);
}
.head{max-width:1500px;margin:auto;padding:14px 18px 12px}
.headtop{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
h1{font-size:22px;margin:0;font-weight:900;letter-spacing:.03em}
.status{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.16);font-size:12px
}
.dot{width:9px;height:9px;border-radius:50%;background:#facc15;box-shadow:0 0 0 4px rgba(250,204,21,.14)}
.dot.online{background:#86efac;box-shadow:0 0 0 4px rgba(134,239,172,.14)}
.dot.offline{background:#fca5a5;box-shadow:0 0 0 4px rgba(252,165,165,.14)}
nav{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;
  padding:5px;border-radius:15px;background:rgba(255,255,255,.08)
}
nav button{
  border:1px solid transparent;background:transparent;color:#eafff7;
  border-radius:11px;padding:10px 8px;font-weight:800;font-size:13px;
  transition:.2s ease
}
nav button:hover{background:rgba(255,255,255,.10)}
nav button.active{
  background:#fff;color:var(--emerald-3);
  box-shadow:0 8px 18px rgba(0,0,0,.13)
}
main{max-width:1500px;margin:auto;padding:22px 18px 36px}
.view{display:none}.view.active{display:block}
.panel{
  background:var(--panel);
  backdrop-filter:blur(12px);
  border:1px solid rgba(223,232,228,.95);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}
.panel h2{margin-top:0;font-size:21px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.builder{display:grid;grid-template-columns:300px 1fr;gap:18px}
.sticky{position:sticky;top:126px;align-self:start}
.field{margin-bottom:13px}
label{
  display:block;font-size:12px;font-weight:900;margin-bottom:6px;
  color:#35534a;letter-spacing:.03em
}
input,select,textarea{
  width:100%;border:1px solid #cadad4;border-radius:12px;
  padding:11px 12px;background:rgba(255,255,255,.96);color:var(--text);
  transition:.2s ease
}
textarea{min-height:88px;resize:vertical}
input:hover,select:hover,textarea:hover{border-color:#9ed7c3}
input:focus,select:focus,textarea:focus{
  outline:0;border-color:var(--emerald);
  box-shadow:0 0 0 4px rgba(16,185,129,.13);
  background:#fff
}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{
  border:0;border-radius:11px;padding:10px 14px;font-weight:900;
  transition:.2s ease;box-shadow:none
}
.btn:hover{transform:translateY(-1px)}
.primary{
  background:linear-gradient(135deg,var(--emerald),var(--emerald-2));
  color:#fff;box-shadow:0 8px 18px rgba(16,185,129,.22)
}
.primary:hover{box-shadow:0 12px 24px rgba(16,185,129,.28)}
.secondary{background:#eaf8f2;color:#08684d}
.secondary:hover{background:#dff5ec}
.danger{background:#fff1f2;color:var(--danger);border:1px solid #fecdd3}
.small{padding:7px 9px;font-size:12px}
.notice{
  background:linear-gradient(135deg,#effcf7,#f8fffc);
  border:1px solid #bcebd8;border-radius:14px;padding:12px 14px;
  margin-bottom:14px;color:#16624c;box-shadow:var(--shadow-sm)
}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{
  display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;
  font-weight:900;font-size:12px;background:var(--soft);color:var(--cat);
  border:1px solid color-mix(in srgb,var(--cat) 22%,white)
}
.chip i{width:9px;height:9px;border-radius:50%;background:var(--cat)}
.cat-overall{--cat:var(--overall);--soft:#e8f1ff}
.cat-strength{--cat:var(--strength);--soft:#e9fbea}
.cat-sprint{--cat:var(--sprint);--soft:#fff0f0}
.cat-hurdle{--cat:var(--hurdle);--soft:#fff3e8}
.cat-jump{--cat:var(--jump);--soft:#f3edff}
.cat-throw{--cat:var(--throw);--soft:#fff8df}
.cat-distance{--cat:var(--distance);--soft:#e6fbff}
.section{
  border:1px solid color-mix(in srgb,var(--cat) 23%,white);
  border-radius:16px;overflow:hidden;margin-bottom:14px;
  background:#fff;box-shadow:var(--shadow-sm)
}
.section h3{
  margin:0;padding:12px 14px;background:linear-gradient(90deg,var(--soft),#fff);
  color:var(--cat);font-size:15px;border-bottom:1px solid color-mix(in srgb,var(--cat) 18%,white)
}
.picker{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px;background:#fbfefd}
.picker select{border-left:6px solid var(--cat);background:var(--soft)}
.items{padding:10px}
.item{
  display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;
  border:1px solid color-mix(in srgb,var(--cat) 16%,white);
  border-left:6px solid var(--cat);
  background:linear-gradient(90deg,var(--soft),#fff 42%);
  padding:10px;border-radius:11px;margin-bottom:7px
}
.item small{color:var(--muted)}
.menu-list{display:grid;gap:12px}
.menu{
  position:relative;
  display:grid;
  grid-template-columns:48px minmax(0,1fr);
  border:1px solid color-mix(in srgb,var(--cat) 18%,white);
  border-radius:16px;
  padding:0;overflow:hidden;background:#fff;
  box-shadow:var(--shadow-sm);
  transition:.2s ease
}
.menu:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(15,83,64,.12)}
.menu-rail{
  background:linear-gradient(180deg,color-mix(in srgb,var(--cat) 88%,white),var(--cat));
  color:#fff;display:flex;align-items:center;justify-content:center;
  padding:10px 4px;font-size:12px;font-weight:900;letter-spacing:.12em;
  writing-mode:vertical-rl;text-orientation:upright;min-height:138px
}
.menu-content{
  padding:15px 16px;
  background:linear-gradient(90deg,var(--soft),#fff 42%)
}
.menu h4{margin:0 0 7px;font-size:17px}
.meta{color:var(--muted);font-size:12px;margin:7px 0;line-height:1.6}
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.filters{
  display:grid;grid-template-columns:240px 1fr;gap:10px;margin-bottom:13px;
  padding:12px;border-radius:14px;background:#f7fbf9;border:1px solid var(--line)
}
.empty{padding:18px;text-align:center;color:#98a2b3;border:1px dashed #c7d6d1;border-radius:12px;background:#fbfdfc}
.week-wrap{
  overflow:auto;max-height:calc(100vh - 205px);
  border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:var(--shadow-sm)
}
.week{border-collapse:separate;border-spacing:0;min-width:1450px;width:100%}
.week th,.week td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px;vertical-align:top}
.week thead th{
  position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#f0fcf7,#e7f8f1);
  min-width:180px;color:#245548
}
.week thead th:first-child{left:0;z-index:7}
.week tbody th{
  position:sticky;left:0;z-index:4;min-width:190px;
  background:linear-gradient(90deg,var(--soft),#fff);
  color:var(--cat);border-left:7px solid var(--cat);font-weight:900
}
.weekcell{min-height:108px}
.weekitem{
  display:grid;grid-template-columns:1fr auto;gap:5px;
  background:linear-gradient(90deg,var(--soft),#fff);
  border:1px solid color-mix(in srgb,var(--cat) 18%,white);
  border-left:5px solid var(--cat);padding:6px 7px;border-radius:8px;
  margin-top:6px;font-size:12px;font-weight:800
}
.x{border:0;border-radius:6px;background:#fff;color:#b42318;font-weight:900}
.login{
  position:fixed;inset:0;z-index:100;
  background:radial-gradient(circle at top,rgba(16,185,129,.24),transparent 35%),rgba(5,39,30,.84);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:18px
}
.login.hidden{display:none}
.loginbox{
  background:rgba(255,255,255,.97);border:1px solid rgba(255,255,255,.7);
  border-radius:24px;padding:26px;width:min(440px,100%);
  box-shadow:0 28px 80px rgba(0,0,0,.28)
}
.loginbox h2{margin:0 0 6px;font-size:24px}
.muted{color:var(--muted)}
@media(max-width:900px){
  nav{grid-template-columns:repeat(2,1fr)}
  .grid2,.builder{grid-template-columns:1fr}
  .sticky{position:static}
  .filters{grid-template-columns:1fr}
  .week-wrap{max-height:none}
  .menu{grid-template-columns:38px minmax(0,1fr)}
  .menu-rail{font-size:11px;min-height:118px}
  main{padding:15px 12px 28px}
  .panel{padding:15px;border-radius:16px}
}
@media print{
  header,.no-print,.login{display:none!important}
  body{background:#fff}
  .panel,.menu,.section{box-shadow:none}
  .view{display:none!important}
  .view.print{display:block!important}
}
</style>

</head>
<body>
<div id="login" class="login hidden">
 <div class="loginbox">
  <h2>コーチログイン</h2>
  <p class="muted">管理者が登録したコーチアカウントでログインしてください。</p>
  <div class="field"><label>メールアドレス</label><input id="email" type="email"></div>
  <div class="field"><label>パスワード</label><input id="password" type="password"></div>
  <button id="loginBtn" class="btn primary" style="width:100%">ログイン</button><p class="muted" style="margin-bottom:0">アカウント追加は管理者がFirebaseコンソールから行います。</p>
  <p id="loginMsg" class="muted"></p>
 </div>
</div>

<header><div class="head">
 <div class="headtop"><h1>HAMAWAKI AC｜Training Manager</h1>
  <div class="status"><span id="dot" class="dot"></span><span id="dbstatus">確認中</span><span id="savestatus"></span><button id="logout" class="btn secondary small" style="display:none">ログアウト</button></div>
 </div>
 <nav>
  <button class="active" data-view="today">今日・一覧</button>
  <button data-view="daily">日別作成</button>
  <button data-view="weekly">週間入力</button>
  <button data-view="menus">メニュー管理</button>
 </nav>
</div></header>

<main>
<section id="v-today" class="view active">
 <div class="panel">
  <div class="toolbar no-print"><input id="todayDate" type="date" style="width:auto"><div class="actions"><button id="editDay" class="btn secondary">この日を編集</button><button id="printDay" class="btn primary">印刷</button></div></div>
  <div id="todayContent"></div>
 </div>
 <div class="panel"><h2>作成済み練習一覧</h2><div id="dayList"></div></div>
</section>

<section id="v-daily" class="view">
 <div class="notice">各欄のプルダウンからメニューを選択し、「追加」を押します。</div>
 <div class="builder">
  <aside class="panel sticky no-print">
   <div class="field"><label>日付</label><input id="dailyDate" type="date"></div>
   <div class="field"><label>テーマ</label><input id="theme"></div>
   <div class="field"><label>連絡事項</label><textarea id="notes"></textarea></div>
   <div class="actions"><button id="saveDay" class="btn primary">保存</button><button id="copyPrev" class="btn secondary">前日コピー</button><button id="deleteDay" class="btn danger">削除</button></div>
  </aside>
  <div id="dailySections"></div>
 </div>
</section>

<section id="v-weekly" class="view">
 <div class="panel">
  <div class="toolbar no-print">
   <button id="prevWeek" class="btn secondary">←前の週</button>
   <div class="actions"><button id="thisWeek" class="btn secondary">今週</button><input id="weekDate" type="date" style="width:auto"><strong id="weekTitle"></strong></div>
   <div class="actions"><button id="saveWeek" class="btn primary">1週間を保存</button><button id="nextWeek" class="btn secondary">次の週→</button></div>
  </div>
  <div class="week-wrap"><table class="week"><thead id="weekHead"></thead><tbody id="weekBody"></tbody></table></div>
 </div>
</section>

<section id="v-menus" class="view">
 <div class="panel"><h2 id="formTitle">メニュー登録・編集</h2><p class="muted" style="margin-top:-6px">新しい練習メニューの作成と既存メニューの編集を行います。</p><input id="editId" type="hidden">
  <div class="grid2">
   <div>
    <div class="field"><label>メニュー名</label><input id="name"></div>
    <div class="field"><label>種類</label><select id="category"></select></div>
    <div class="field"><label>配置</label><select id="placement"><option value="middle">種目別・中央</option><option value="before">練習前半</option><option value="after">練習後半</option><option value="both">前半・後半どちらでも</option></select></div>
    <div class="field"><label>内容</label><textarea id="detail"></textarea></div>
   </div>
   <div>
    <div class="field"><label>本数・セット</label><input id="sets"></div>
    <div class="field"><label>強度・設定</label><input id="intensity"></div>
    <div class="field"><label>レスト</label><input id="rest"></div>
    <div class="field"><label>所要時間</label><input id="duration"></div>
    <div class="field"><label>対象</label><input id="target"></div>
    <div class="field"><label>注意点</label><textarea id="caution"></textarea></div>
   </div>
  </div>
  <div class="actions"><button id="saveMenu" class="btn primary">保存</button><button id="resetMenu" class="btn secondary">リセット</button></div>
 </div>
 <div class="panel"><h2>登録済みメニュー一覧</h2><p class="muted" style="margin-top:-6px">種目ごとに色分けして表示しています。</p>
  <div class="legend" id="legend"></div>
  <div class="filters no-print"><select id="filterCat"></select><input id="filterText" placeholder="検索"></div>
  <div id="menuList" class="menu-list"></div>
 </div>
</section>
</main>

<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const TEAM_ID="athletics-club";
const CATS=["全体メニュー","短距離メニュー","ハードルメニュー","跳躍メニュー","投擲メニュー","長距離メニュー","筋トレメニュー"];
const STARTER_MENUS=[{"id": "overall-warmup-20", "name": "全体ウォームアップ20分", "category": "全体メニュー", "placement": "before", "detail": "ジョグ5分、動的ストレッチ5分、モビリティ5分、流し60m×3。90名を3〜4グループに分けて実施。", "sets": "1式", "intensity": "低〜中", "rest": "移動中", "duration": "20分", "target": "全員", "caution": "体調確認と痛みの申告を最初に行う"}, {"id": "overall-warmup-30", "name": "土曜全体ウォームアップ30分", "category": "全体メニュー", "placement": "before", "detail": "ジョグ8分、動的ストレッチ、ミニハードル、スキップ系ドリル、流し80m×3。", "sets": "1式", "intensity": "低〜中", "rest": "適宜", "duration": "30分", "target": "全員", "caution": "種目別に必要な可動域を追加する"}, {"id": "overall-running-drills", "name": "共通ランニングドリル", "category": "全体メニュー", "placement": "before", "detail": "Aスキップ、Bスキップ、腿上げ、バウンディング、快調走60m×2。", "sets": "各20m×2", "intensity": "中", "rest": "歩いて戻る", "duration": "15分", "target": "全員", "caution": "速さより姿勢と接地を優先"}, {"id": "overall-speed-coordination", "name": "全体スピード調整走", "category": "全体メニュー", "placement": "before", "detail": "60m流しを70％、80％、90％で1本ずつ。種目別練習へ移る前の動き確認。", "sets": "60m×3", "intensity": "70〜90％", "rest": "2分", "duration": "12分", "target": "全員", "caution": "競走にしない"}, {"id": "overall-cooldown-15", "name": "全体クールダウン15分", "category": "全体メニュー", "placement": "after", "detail": "軽いジョグ、呼吸を整える歩行、静的ストレッチ、振り返り。", "sets": "1式", "intensity": "低", "rest": "なし", "duration": "15分", "target": "全員", "caution": "痛みや違和感をコーチへ報告"}, {"id": "overall-cooldown-25", "name": "土曜リカバリー25分", "category": "全体メニュー", "placement": "after", "detail": "ジョグ8分、ペアストレッチ、フォームローラー、翌日のセルフケア確認。", "sets": "1式", "intensity": "低", "rest": "なし", "duration": "25分", "target": "全員", "caution": "強く伸ばしすぎない"}, {"id": "overall-relay", "name": "全体リレー・チーム走", "category": "全体メニュー", "placement": "middle", "detail": "学年・種目混成チームで100mまたは200mリレー。競技力とチームづくりを両立。", "sets": "2〜3レース", "intensity": "85〜95％", "rest": "8〜10分", "duration": "25分", "target": "全員", "caution": "バトンゾーンと走路の安全管理"}, {"id": "sprint-accel-30", "name": "加速走30m", "category": "短距離メニュー", "placement": "middle", "detail": "3点またはクラウチングスタートから30m。最初の10歩の押し出しと姿勢変化を確認 ];
let menus=[],days={},daily=blankDay(),weekStart=getMonday(todayISO()),weekDraft={};
let db=null,auth=null,user=null,cloud=false,unsubMenus=null,unsubDays=null;

function el(id){return document.getElementById(id)}
function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function cls(cat){return({"全体メニュー":"cat-overall","筋トレメニュー":"cat-strength","短距離メニュー":"cat-sprint","ハードルメニュー":"cat-hurdle","跳躍メニュー":"cat-jump","投擲メニュー":"cat-throw","長距離メニュー":"cat-distance"})[cat]||""}
function blankDay(){const sections={};SECTIONS.forEach(s=>sections[s.id]=[]);return{theme:"",notes:"",sections}}
function todayISO(){const d=new Date();return new Date(d-d.getTimezoneOffset()*60000).toISOString().slice(0,10)}
function addDays(v,n){const d=new Date(v+"T00:00:00");d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function getMonday(v){const d=new Date(v+"T00:00:00"),w=d.getDay();d.setDate(d.getDate()+(w===0?-6:1-w));return d.toISOString().slice(0,10)}
function fmt(v){return new Date(v+"T00:00:00").toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"short"})}
function setStatus(t,state=""){el("dbstatus").textContent=t;el("dot").className="dot "+state}
function localSave(){localStorage.setItem("coachMenus",JSON.stringify(menus));localStorage.setItem("coachDays",JSON.stringify(days))}
function markSaved(t="保存済み"){el("savestatus").textContent=t+" "+new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})}

function nav(view){document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));el("v-"+view).classList.add("active");document.querySelector(`nav button[data-view="${view}"]`).classList.add("active");scrollTo(0,0)}
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>nav(b.dataset.view));

function fillBasics(){
 const opts=CATS.map(c=>`<option>${c}</option>`).join("");
 el("category").innerHTML=opts;el("filterCat").innerHTML=`<option value="">すべて</option>${opts}`;
 el("legend").innerHTML=CATS.map(c=>`<span class="chip ${cls(c)}"><i></i>${c.replace("メニュー","")}</span>`).join("");
}

function available(section){return menus.filter(m=>m.category===section.cat&&section.places.includes(m.placement))}
function optionHTML(section){return `<option value="">選択</option>`+available(section).map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join("")}

function renderDaily(){
 el("dailySections").innerHTML=SECTIONS.map(s=>{
  const ids=daily.sections[s.id]||[];
  return `<div class="section ${cls(s.cat)}"><h3>${esc(s.label)}</h3><div class="picker"><select id="pick-${s.id}">${optionHTML(s)}</select><button class="btn primary small" onclick="addDaily('${s.id}')">追加</button></div><div class="items">${ids.length?ids.map((id,i)=>{const m=menus.find(x=>x.id===id);return m?`<div class="item ${cls(m.category)}"><div><b>${esc(m.name)}</b><br><small>${esc([m.sets,m.intensity,m.rest].filter(Boolean).join("／"))}</small></div><button class="btn danger small" onclick="removeDaily('${s.id}',${i})">削除</button></div>`:""}).join(""):`<div class="empty">未設定</div>`}</div></div>`
 }).join("")
}
window.addDaily=id=>{const s=el("pick-"+id);if(s.value){daily.sections[id].push(s.value);renderDaily()}}
window.removeDaily=(id,i)=>{daily.sections[id].splice(i,1);renderDaily()}

function loadDay(date){daily=days[date]?structuredClone(days[date]):blankDay();el("theme").value=daily.theme||"";el("notes").value=daily.notes||"";renderDaily()}
el("dailyDate").onchange=e=>loadDay(e.target.value);

async function saveDayDoc(date,data){
 data={...structuredClone(data),updatedBy:user?.email||"local",updatedAtText:new Date().toISOString()};
 days[date]=data;localSave();renderAll();
 if(cloud){await db.collection("teams").doc(TEAM_ID).collection("days").doc(date).set({...data,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true})}
 markSaved()
}
async function deleteDayDoc(date){delete days[date];localSave();renderAll();if(cloud)await db.collection("teams").doc(TEAM_ID).collection("days").doc(date).delete();markSaved("削除済み")}

el("saveDay").onclick=async()=>{const d=el("dailyDate").value;if(!d)return alert("日付を選択してください");daily.theme=el("theme").value.trim();daily.notes=el("notes").value.trim();await saveDayDoc(d,daily);alert("保存しました")}
el("deleteDay").onclick=async()=>{const d=el("dailyDate").value;if(days[d]&&confirm(fmt(d)+"を削除しますか？")){await deleteDayDoc(d);loadDay(d)}}
el("copyPrev").onclick=()=>{const d=addDays(el("dailyDate").value,-1);if(!days[d])return alert("前日のデータがありません");daily=structuredClone(days[d]);el("theme").value=(daily.theme||"")+"（コピー）";daily.theme=el("theme").value;el("notes").value=daily.notes||"";renderDaily()}

function dayHTML(date,day){
 if(!day)return `<div class="empty">${fmt(date)}は未作成です</div>`;
 const blocks=SECTIONS.map(s=>{const a=day.sections?.[s.id]||[];if(!a.length)return"";return `<div class="section ${cls(s.cat)}"><h3>${esc(s.label)}</h3><div class="items">${a.map(id=>{const m=menus.find(x=>x.id===id);return m?`<div class="item ${cls(m.category)}"><div><b>${esc(m.name)}</b>${m.detail?`<br><small>${esc(m.detail)}</small>`:""}</div></div>`:""}).join("")}</div></div>`}).join("");
 return `<h2>${fmt(date)}</h2>${day.theme?`<p><b>テーマ：</b>${esc(day.theme)}</p>`:""}${blocks}${day.notes?`<p><b>連絡：</b>${esc(day.notes)}</p>`:""}<p class="muted">最終更新：${esc(day.updatedBy||"")}</p>`
}
function renderToday(){const d=el("todayDate").value;el("todayContent").innerHTML=dayHTML(d,days[d]);const list=Object.keys(days).sort().reverse();el("dayList").innerHTML=list.length?list.map(x=>`<div class="panel">${dayHTML(x,days[x])}<div class="actions no-print"><button class="btn secondary small" onclick="openDay('${x}')">編集</button></div></div>`).join(""):`<div class="empty">まだありません</div>`}
window.openDay=d=>{el("dailyDate").value=d;loadDay(d);nav("daily")}
el("editDay").onclick=()=>openDay(el("todayDate").value);el("todayDate").onchange=renderToday;el("printDay").onclick=()=>{el("v-today").classList.add("print");print();setTimeout(()=>el("v-today").classList.remove("print"),300)}

function renderMenus(){
 const c=el("filterCat").value,q=el("filterText").value.toLowerCase(),list=menus.filter(m=>(!c||m.category===c)&&(!q||(m.name+" "+m.detail+" "+m.target).toLowerCase().includes(q)));
 el("menuList").innerHTML=list.length?list.map(m=>`<div class="menu ${cls(m.category)}"><div class="menu-rail">${esc(m.category.replace("メニュー",""))}</div><div class="menu-content"><h4>${esc(m.name)}</h4><span class="chip ${cls(m.category)}"><i></i>${esc(m.category)}</span>${m.detail?`<p>${esc(m.detail)}</p>`:""}<div class="meta">${esc([m.sets,m.intensity,m.rest,m.duration,m.target].filter(Boolean).join("／"))}</div><div class="actions"><button class="btn secondary small" onclick="editMenu('${m.id}')">編集</button><button class="btn danger small" onclick="deleteMenu('${m.id}')">削除</button></div></div></div>`).join(""):`<div class="empty">該当なし</div>`
}
el("filterCat").oninput=renderMenus;el("filterText").oninput=renderMenus;

function menuFormData(){
 return{id:el("editId").value||crypto.randomUUID(),name:el("name").value.trim(),category:el("category").value,placement:el("placement").value,detail:el("detail").value.trim(),sets:el("sets").value.trim(),intensity:el("intensity").value.trim(),rest:el("rest").value.trim(),duration:el("duration").value.trim(),target:el("target").value.trim(),caution:el("caution").value.trim()}
}
async function saveMenuDoc(m){const i=menus.findIndex(x=>x.id===m.id);if(i>=0)menus[i]=m;else menus.push(m);localSave();renderAll();if(cloud)await db.collection("teams").doc(TEAM_ID).collection("menus").doc(m.id).set({...m,updatedBy:user.email,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});markSaved()}
el("saveMenu").onclick=async()=>{const m=menuFormData();if(!m.name)return alert("メニュー名を入力してください");await saveMenuDoc(m);resetMenu();nav("menus");setTimeout(()=>el("menuList").scrollIntoView({behavior:"smooth",block:"start"}),50)}
function resetMenu(){["editId","name","detail","sets","intensity","rest","duration","target","caution"].forEach(i=>el(i).value="");el("category").value=CATS[0];el("placement").value="middle";el("formTitle").textContent="メニュー登録・編集"}
el("resetMenu").onclick=resetMenu;
window.editMenu=id=>{const m=menus.find(x=>x.id===id);if(!m)return;Object.entries({editId:m.id,name:m.name,category:m.category,placement:m.placement,detail:m.detail,sets:m.sets,intensity:m.intensity,rest:m.rest,duration:m.duration,target:m.target,caution:m.caution}).forEach(([k,v])=>el(k).value=v||"");el("formTitle").textContent="メニュー編集";nav("menus");setTimeout(()=>el("formTitle").scrollIntoView({behavior:"smooth",block:"start"}),50)}
window.deleteMenu=async id=>{const m=menus.find(x=>x.id===id);if(!m||!confirm("削除しますか？"))return;menus=menus.filter(x=>x.id!==id);Object.values(days).forEach(d=>SECTIONS.forEach(s=>d.sections[s.id]=(d.sections[s.id]||[]).filter(x=>x!==id)));localSave();renderAll();if(cloud){await db.collection("teams").doc(TEAM_ID).collection("menus").doc(id).delete();const batch=db.batch();Object.entries(days).forEach(([date,d])=>batch.set(db.collection("teams").doc(TEAM_ID).collection("days").doc(date),d,{merge:true}));await batch.commit()}markSaved("削除済み")}

function loadWeek(){weekDraft={};for(let i=0;i<7;i++){const d=addDays(weekStart,i);weekDraft[d]=days[d]?structuredClone(days[d]):blankDay()}}
function renderWeek(){
 const dates=Array.from({length:7},(_,i)=>addDays(weekStart,i));el("weekDate").value=weekStart;el("weekTitle").textContent=`${dates[0]} ～ ${dates[6]}`;
 el("weekHead").innerHTML=`<tr><th>区分</th>${dates.map(d=>`<th>${new Date(d+"T00:00:00").toLocaleDateString("ja-JP",{month:"numeric",day:"numeric",weekday:"short"})}<input value="${esc(weekDraft[d].theme||"")}" placeholder="テーマ" onchange="setWeekTheme('${d}',this.value)" style="margin-top:5px;font-size:12px"></th>`).join("")}</tr>`;
 el("weekBody").innerHTML=SECTIONS.map(s=>`<tr><th class="${cls(s.cat)}">${esc(s.label)}</th>${dates.map(d=>{const ids=weekDraft[d].sections[s.id]||[];return `<td><div class="weekcell ${cls(s.cat)}"><div class="picker"><select id="w-${d}-${s.id}">${optionHTML(s)}</select><button class="btn primary small" onclick="addWeek('${d}','${s.id}')">追加</button></div>${ids.map((id,i)=>{const m=menus.find(x=>x.id===id);return m?`<div class="weekitem ${cls(m.category)}"><span>${esc(m.name)}</span><button class="x" onclick="removeWeek('${d}','${s.id}',${i})">×</button></div>`:""}).join("")}</div></td>`}).join("")}</tr>`).join("")
}
window.addWeek=(d,s)=>{const p=el(`w-${d}-${s}`);if(p.value){weekDraft[d].sections[s].push(p.value);renderWeek()}}
window.removeWeek=(d,s,i)=>{weekDraft[d].sections[s].splice(i,1);renderWeek()}
window.setWeekTheme=(d,v)=>weekDraft[d].theme=v;
function shiftWeek(n){weekStart=addDays(weekStart,n*7);loadWeek();renderWeek()}
el("prevWeek").onclick=()=>shiftWeek(-1);el("nextWeek").onclick=()=>shiftWeek(1);el("thisWeek").onclick=()=>{weekStart=getMonday(todayISO());loadWeek();renderWeek()};el("weekDate").onchange=e=>{weekStart=getMonday(e.target.value);loadWeek();renderWeek()}
el("saveWeek").onclick=async()=>{if(cloud){const batch=db.batch();for(const [date,d] of Object.entries(weekDraft)){d.updatedBy=user.email;d.updatedAtText=new Date().toISOString();days[date]=structuredClone(d);batch.set(db.collection("teams").doc(TEAM_ID).collection("days").doc(date),{...d,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true})}await batch.commit()}else Object.assign(days,structuredClone(weekDraft));localSave();renderAll();markSaved();alert("1週間を保存しました")}

function renderAll(){renderMenus();renderDaily();renderToday();renderWeek()}
function configured(){return window.FIREBASE_CONFIG?.apiKey&&!String(window.FIREBASE_CONFIG.apiKey).includes("ここに")}
function startRealtime(){
 if(unsubMenus)unsubMenus();if(unsubDays)unsubDays();
 unsubMenus=db.collection("teams").doc(TEAM_ID).collection("menus").onSnapshot(s=>{menus=s.docs.map(d=>({id:d.id,...d.data()}));localSave();renderAll()},e=>setStatus("メニュー読込エラー","offline"));
 unsubDays=db.collection("teams").doc(TEAM_ID).collection("days").onSnapshot(s=>{days={};s.docs.forEach(d=>days[d.id]=d.data());localSave();loadDay(el("dailyDate").value);loadWeek();renderAll()},e=>setStatus("練習読込エラー","offline"));
}

async function seedStarterMenus(){
 if(menus.length) return;
 menus=structuredClone(STARTER_MENUS);
 localSave();
 renderAll();

 if(cloud && user){
  const batch=db.batch();
  STARTER_MENUS.forEach(m=>{
   const ref=db.collection("teams").doc(TEAM_ID).collection("menus").doc(m.id);
   batch.set(ref,{...m,updatedBy:user.email,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
  });
  await batch.commit();
  markSaved("初期メニュー登録済み");
 }
}

async function seedCloudIfEmpty(){
 const snap=await db.collection("teams").doc(TEAM_ID).collection("menus").limit(1).get();
 if(snap.empty) await seedStarterMenus();
}

async function init(){
 menus=JSON.parse(localStorage.getItem("coachMenus")||"[]");days=JSON.parse(localStorage.getItem("coachDays")||"{}");if(!menus.length)menus=structuredClone(STARTER_MENUS);
 fillBasics();el("todayDate").value=todayISO();el("dailyDate").value=todayISO();el("weekDate").value=weekStart;loadDay(todayISO());loadWeek();renderAll();
 if(!configured()){setStatus("未接続・端末保存","offline");return}
 try{
  firebase.initializeApp(window.FIREBASE_CONFIG);auth=firebase.auth();db=firebase.firestore();cloud=true;
  auth.onAuthStateChanged(u=>{user=u;if(u){el("login").classList.add("hidden");el("logout").style.display="";setStatus("リアルタイム接続","online");el("savestatus").textContent=u.email;startRealtime();seedCloudIfEmpty()}else{el("login").classList.remove("hidden");el("logout").style.display="none";setStatus("ログイン待ち","")}})
 }catch(e){console.error(e);setStatus("接続エラー","offline")}
}
el("loginBtn").onclick=async()=>{try{el("loginMsg").textContent="ログイン中";await auth.signInWithEmailAndPassword(el("email").value.trim(),el("password").value);el("loginMsg").textContent=""}catch(e){el("loginMsg").textContent="ログインできませんでした"}}
el("logout").onclick=()=>auth.signOut();
init();
</script>
</body>
</html>
